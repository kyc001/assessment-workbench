- number: 20
  section_id: final
  topic_tags: [函数与导数]
  statement: 已知函数 $f(x)=x-\ln x$，$x>0$。（1）求 $f(x)$ 的最小值；（2）证明对任意 $x>0$，有 $\ln x\leq x-1$。
  final_answer: （1）最小值为 1；（2）结论成立，等号当且仅当 $x=1$。
  solution_steps:
    - 求导得 $f'(x)=1-\dfrac1x=\dfrac{x-1}{x}$。
    - 当 $0<x<1$ 时导数为负，当 $x>1$ 时导数为正，所以 $x=1$ 处取得最小值 1。
    - 由 $x-\ln x\geq1$ 移项得到 $\ln x\leq x-1$，等号当且仅当 $x=1$。
  rubric:
    - description: 正确求导并写出导数表达式
      score: 3
    - description: 正确判断单调性
      score: 3
    - description: 求得最小值 1
      score: 2
    - description: 由最小值完成不等式证明并说明等号条件
      score: 4
